name: Optimize IP

on:
  schedule:
    - cron: '0 6 * * *'   # UTC 06:00 每天一次
  workflow_dispatch:       # 手动触发

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run IP Optimizer
        run: python cf_optimizer.py -c 30 -t 5

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "🔄 Auto-update IP optimize results [skip ci]"
          git push
